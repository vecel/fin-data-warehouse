name: fin_data_warehouse
services:
  data-acquisition:
    build: ../data-acquisition
    container_name: acquisition
    environment:
      - FRED_API_KEY=${FRED_API_KEY}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - CACHE_DIRECTORY=/app/cache
      - STAGING_DIRECTORY=/app/staging
    volumes:
      - ../staging:/app/staging
      - ../cache:/app/cache

  db:
    image: postgres:16
    container_name: database
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TABLEAU_USER_PASSWORD=${TABLEAU_USER_PASSWORD}
    volumes:
      - postgres_db:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./init-passwords.sh:/docker-entrypoint-initdb.d/02_set_tableau_password.sh:ro 
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s

  loader:
    build: ../data-loader
    container_name: loader
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=db
      - STAGING_DIRECTORY=/app/staging
    volumes:
      - ../staging:/app/staging
    depends_on:
      db:
        condition: service_healthy

  dbt:
    build: ../data-processing
    container_name: dbt
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=db
      - SEEDS_DIRECTORY=seeds
    volumes:
      - ../staging:/app/seeds
    depends_on:
      db:
        condition: service_healthy

  data-serving:
    build: ../data-serving
    container_name: api
    ports:
      - "8040:8040"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=db
    depends_on:
      db:
        condition: service_healthy

  data-visualization:
    build: ../data-visualization
    container_name: frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://data-serving:8040
    depends_on:
      - data-serving

volumes:
  postgres_db:
